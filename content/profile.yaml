# Locked header/footer content + tunable settings.
# PLACEHOLDERS: name + contacts + skill items + non-technical dates are stubs for
# the owner to overwrite. Education / coursework / awards are real.
# Bullet/skill text is treated as raw LaTeX (escape & as \&, etc.).
name: "Your Name"   # TODO: replace with your name

# Header line, left -> right: phone, email, github, portfolio, linkedin.
contacts:
  - text: "000-000-0000"                       # TODO: phone
  - text: "you@example.com"                     # TODO: email
    href: "mailto:you@example.com"
  - text: "github.com/yourhandle"               # TODO: github
    href: "https://github.com/yourhandle"
  - text: "yoursite.com"                        # TODO: portfolio website
    href: "https://yoursite.com"
  - text: "linkedin.com/in/yourhandle"          # TODO: linkedin
    href: "https://linkedin.com/in/yourhandle"

education:
  - school: "Brandeis University"
    location: "Waltham, MA"
    degree: "B.S. in Computer Science, Minors in Psychology and Philosophy"
    dates: "Expected May 2027"

# Relevant coursework — score-governed: the app reorders/trims these per JD and
# shows the top ones on 1 line (2 if many are relevant + there's room). Course
# NAMES are shown verbatim; `tags` are invisible scoring metadata (terms a JD
# might use). Edit names/tags freely; nothing here is ever rewritten by a model.
coursework:
  - name: "Machine Learning"
    tags: ["machine learning", "ml", "ai"]
  - name: "NVIDIA Deep Learning (Neural Networks)"
    tags: ["deep learning", "neural networks", "machine learning", "ml", "ai"]
  - name: "Data Structures and Algorithms"
    tags: ["data structures", "algorithms"]
  - name: "Operating Systems"
    tags: ["operating systems", "systems"]
  - name: "Computer Security"
    tags: ["security", "cybersecurity", "computer security"]
  - name: "Computer Networking"
    tags: ["networking", "computer networks"]
  - name: "Relational Databases (SQL)"
    tags: ["sql", "postgres", "databases", "relational database"]
  - name: "Web Development"
    tags: ["web development", "frontend", "fullstack", "react"]
  - name: "Mobile App Development"
    tags: ["mobile", "mobile development", "ios", "android"]
  - name: "Linear Algebra"
    tags: ["linear algebra", "math"]
  - name: "Probability and Statistics"
    tags: ["statistics", "probability", "math"]
  - name: "Discrete Mathematics"
    tags: ["discrete math", "math"]

# Static, locked. Shown as one inline line under "Awards & Certifications".
awards:
  - "Dean's List"
  - "DeisHacks 2026"
  - "Claude Code Certification"
